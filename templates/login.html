{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetCake Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <!-- Login Box -->
    <div class="login-box">
        <!-- Logo -->
        <div class="login-logo">
            <h1>
                Sweet<span>Cake</span>
            </h1>
        </div>

        <!-- Heading -->
        <div class="login-heading">
            <h2>Welcome Back</h2>
            <p>
                Login to continue your sweet journey with us
            </p>
        </div>

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <!-- Email -->
            <div class="input-group-custom">
                <label>Email Address</label>
                <div class="input-box">
                    <i class="bi bi-envelope-fill"></i>
                    <input name="email" type="email" placeholder="Enter your email">
                </div>
            </div>

            <!-- Password -->
            <div class="input-group-custom">
                <label>Password</label>
                <div class="input-box">
                    <i class="bi bi-lock-fill"></i>
                    <input name="password" type="password" placeholder="Enter your password">
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="forgot-password">
                <a href="#">
                    Forgot Password?
                </a>
            </div>

            <!-- Login Button -->
            <button class="login-btn">
                    Login
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Signup -->
        <div class="signup-text">
            <p>
                Don't have an account?
                <a href="{% url 'register-page' %}">
                    Create New Account
                </a>
            </p>
            <p class="mt-3">
                <a href="./admin/dashboard.html" class="text-decoration-none" style="color: #ff4d6d; font-weight: 700;">
                    <i class="bi bi-shield-lock-fill"></i> Access Admin Portal
                </a>
            </p>
        </div>
    </div>
</body>

</html>
