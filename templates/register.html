{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account - SweetCake</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/register.css' %}">

</head>

<body>

    <!-- Signup Box -->
    <div class="signup-box">

        <!-- Logo -->
        <div class="signup-logo">

            <h1>
                Sweet<span>Cake</span>
            </h1>

        </div>

        <!-- Heading -->
        <div class="signup-heading">

            <h2>Create Account</h2>

            <p>
                Join SweetCake and enjoy delicious moments with us
            </p>

        </div>

        
        <!-- Form -->
        <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

            <!-- Full Name -->
            <div class="input-group-custom">

                <label>Full Name</label>

                <div class="input-box">

                    <i class="bi bi-person-fill"></i>

                    <input name="user_name" type="text" placeholder="Enter your full name">

                </div>

            </div>

            <!-- Email -->
            <div class="input-group-custom">

                <label>Email Address</label>

                <div class="input-box">

                    <i class="bi bi-envelope-fill"></i>

                    <input name="email" type="email" placeholder="Enter your email">

                </div>

            </div>

            <!-- Phone -->
            <div class="input-group-custom">

                <label>Phone Number</label>

                <div class="input-box">

                    <i class="bi bi-telephone-fill"></i>

                    <input name="phone" type="tel" placeholder="Enter your phone number">

                </div>

            </div>

            <!-- Password -->
            <div class="input-group-custom">

                <label>Password</label>

                <div class="input-box">

                    <i class="bi bi-lock-fill"></i>

                    <input name="password" type="password" placeholder="Create a password">

                </div>

            </div>

            <!-- Signup Button -->
            <button class="signup-btn">

                Create Account

            </button>

        </form>

        <!-- Divider -->
        <div class="divider">

            <span>OR</span>

        </div>

        <!-- Login Text -->
        <div class="login-text">

            <p>
                Already have an account?
                <a href="./login.html">
                    Login Here
                </a>
            </p>

        </div>

    </div>

</body>

</html>
