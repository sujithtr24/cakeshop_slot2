{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="{% static 'css/admin/common.css' %}">

    {% block style %}

    {% endblock %}
    
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-wrapper">

        <!-- Sidebar Start -->
            <div class="sidebar" id="adminSidebar">
                <div class="sidebar-brand">
                    <i class="bi bi-cake2-fill"></i> Sweet<span>Cake</span>
                </div>
                
                <ul class="sidebar-menu">
                    <li class="menu-item">
                        <a href="{% url 'admin-dashboard' %}" class="menu-link">
                            <i class="bi bi-grid-1x2-fill"></i> Dashboard
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="{% url 'adminCustomers' %}" class="menu-link">
                            <i class="bi bi-people-fill"></i> Customers
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="{% url 'adminProducts' %}" class="menu-link">
                            <i class="bi bi-box-seam-fill"></i> Products
                        </a>
                    </li>
                    <li class="menu-item active">
                        <a href="{% url 'adminAddProducts' %}" class="menu-link">
                            <i class="bi bi-plus-circle-fill"></i> Add Product
                        </a>
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <div class="admin-avatar">A</div>
                    <div class="admin-info">
                        <h6>SweetCake Admin</h6>
                        <span>System Manager</span>
                    </div>
                </div>
            </div>
            <!-- Sidebar End -->

            {% block content %}

            {% endblock %}

            {% block endcomponents %}
            
            {% endblock %}

        </div>
        
</body>
</html>
